<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrazione | SoapLab</title>
    <style>
        :root {
            --primary-color: #2d3436;
            --accent-color: #00cec9;
            --bg-color: #f0f2f5;
            --error-color: #ff7675;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px 0; /* Spazio extra per mobile */
        }

        .register-card {
            background: white;
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }

        .register-card h1 {
            color: var(--primary-color);
            margin-bottom: 0.5rem;
            font-size: 2rem;
            letter-spacing: -1px;
        }

        .register-card p {
            color: #b2bec3;
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }

        .form-row {
            display: flex;
            gap: 15px;
            margin-bottom: 1.2rem;
        }

        .form-group {
            text-align: left;
            flex: 1;
            margin-bottom: 1.2rem;
        }

        label {
            display: block;
            margin-bottom: 0.4rem;
            color: var(--primary-color);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #dfe6e9;
            border-radius: 10px;
            box-sizing: border-box;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--accent-color);
            background-color: #fff;
        }

        .checkbox-group {
            text-align: left;
            margin: 1.5rem 0;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.85rem;
            color: #636e72;
        }

        .checkbox-group input {
            width: auto;
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, background 0.3s;
        }

        button:hover {
            background-color: #1e272e;
            transform: translateY(-2px);
        }

        .footer-links {
            margin-top: 2rem;
            font-size: 0.85rem;
            border-top: 1px solid #f1f2f6;
            padding-top: 1.5rem;
        }

        .footer-links a {
            color: var(--accent-color);
            text-decoration: none;
            font-weight: 600;
        }

        .brand-dot {
            color: var(--accent-color);
        }

        @media (max-width: 480px) {
            .form-row {
                flex-direction: column;
                gap: 0;
            }
        }
    </style>
</head>
<body>

<div class="register-card">
    <h1>SoapLab<span class="brand-dot">.</span></h1>
    <p>Crea il tuo account ricercatore</p>

    <form action="register-process.php" method="POST">
        <div class="form-row">
            <div class="form-group">
                <label for="name">Nome</label>
                <input type="text" id="name" name="name" placeholder="Mario" required>
            </div>
            <div class="form-group">
                <label for="surname">Cognome</label>
                <input type="text" id="surname" name="surname" placeholder="Rossi" required>
            </div>
        </div>

        <div class="form-group">
            <label for="email">Email Universitaria / Lab</label>
            <input type="email" id="email" name="email" placeholder="mario.rossi@soaplab.it" required>
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="••••••••" required>
        </div>

        <div class="form-group">
            <label for="confirm-password">Conferma Password</label>
            <input type="password" id="confirm-password" name="confirm-password" placeholder="••••••••" required>
        </div>

        <div class="checkbox-group">
            <input type="checkbox" id="terms" name="terms" required>
            <label for="terms" style="text-transform: none; font-weight: 400; margin: 0;">
                Accetto i <a href="privacy-policy.html" target="_blank">termini e le condizioni</a>
            </label>
        </div>

        <button type="submit">Crea Account</button>
    </form>

    <div class="footer-links">
        Hai già un account? <a href="login.html">Accedi qui</a>
    </div>
</div>

</body>
</html>
