<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrazione | SoapLab</title>
    <style>
        :root {
            --primary-color: #2d3436;
            --accent-color: #00cec9;
            --bg-color: #f0f2f5;
            --error-color: #ff7675;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px 0;
        }

        .register-card {
            background: white;
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }

        .register-card h1 { color: var(--primary-color); margin-bottom: 0.5rem; font-size: 2rem; }
        .register-card p { color: #b2bec3; margin-bottom: 2rem; font-size: 0.95rem; }
        
        /* Stile per il box di errore */
        .error-box {
            display: none;
            background-color: #ffebee;
            color: #c62828;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            font-weight: 600;
            border: 1px solid #ffcdd2;
        }

        .form-row { display: flex; gap: 15px; margin-bottom: 1.2rem; }
        .form-group { text-align: left; flex: 1; margin-bottom: 1.2rem; }
        label { display: block; margin-bottom: 0.4rem; color: var(--primary-color); font-size: 0.8rem; font-weight: 600; text-transform: uppercase; }
        input { width: 100%; padding: 12px; border: 2px solid #dfe6e9; border-radius: 10px; box-sizing: border-box; font-size: 1rem; }
        input:focus { outline: none; border-color: var(--accent-color); }
        .checkbox-group { text-align: left; margin: 1.5rem 0; display: flex; align-items: center; gap: 10px; font-size: 0.85rem; }
        .checkbox-group input { width: auto; }
        
        button { width: 100%; padding: 14px; background-color: var(--primary-color); color: white; border: none; border-radius: 10px; font-size: 1rem; font-weight: 600; cursor: pointer; }
        button:hover { background-color: #1e272e; }
        .footer-links { margin-top: 2rem; font-size: 0.85rem; border-top: 1px solid #f1f2f6; padding-top: 1.5rem; }
        .footer-links a { color: var(--accent-color); text-decoration: none; font-weight: 600; }
        .brand-dot { color: var(--accent-color); }
    </style>
</head>
<body>

<div class="register-card">
    <h1>SoapLab<span class="brand-dot">.</span></h1>
    <p>Crea il tuo account SoapLab</p>

    <div id="error-message" class="error-box"></div>

    <form action="db/register-process.php" method="POST">
        <div class="form-row">
            <div class="form-group">
                <label for="name">Nome</label>
                <input type="text" id="name" name="name" placeholder="Mario" required>
            </div>
            <div class="form-group">
                <label for="surname">Cognome</label>
                <input type="text" id="surname" name="surname" placeholder="Rossi" required>
            </div>
        </div>

        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="mario.rossi@soaplab.it" required>
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="••••••••" required>
        </div>

        <div class="form-group">
            <label for="confirm-password">Conferma Password</label>
            <input type="password" id="confirm-password" name="confirm-password" placeholder="••••••••" required>
        </div>

        <div class="checkbox-group">
            <input type="checkbox" id="terms" name="terms" required>
            <label for="terms" style="text-transform: none; font-weight: 400; margin: 0;">
                Accetto i <a href="privacy-policy.html" target="_blank">termini e le condizioni</a>
            </label>
        </div>

        <button type="submit">Crea Account</button>
    </form>

    <div class="footer-links">
        Hai già un account? <a href="login.html">Accedi qui</a>
    </div>
</div>

<script>
    // Legge i parametri dall'URL (es: ?error=email_exists)
    const urlParams = new URLSearchParams(window.location.search);
    const error = urlParams.get('error');
    const errorBox = document.getElementById('error-message');

    if (error) {
        errorBox.style.display = 'block'; // Rende visibile il box
        
        // Personalizza il messaggio in base al tipo di errore
        if (error === 'email_exists') {
            errorBox.innerText = 'Questa email è già registrata. Prova ad accedere.';
        } else if (error === 'password_mismatch') {
            errorBox.innerText = 'Le password non coincidono. Riprova.';
        } else if (error === 'insert_failed') {
            errorBox.innerText = 'Errore durante la registrazione. Riprova più tardi.';
        } else {
            errorBox.innerText = 'Si è verificato un errore.';
        }
    }
</script>

</body>
</html>
