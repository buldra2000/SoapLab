<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | SoapLab</title>
    <style>
        :root {
            --primary-color: #2d3436;
            --accent-color: #00cec9;
            --bg-color: #f0f2f5;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .login-card {
            background: white;
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 380px;
            text-align: center;
        }

        .login-card h1 {
            color: var(--primary-color);
            margin-bottom: 0.5rem;
            font-size: 2rem;
            letter-spacing: -1px;
        }

        .login-card p {
            color: #b2bec3;
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }

        .form-group {
            text-align: left;
            margin-bottom: 1.2rem;
        }

        label {
            display: block;
            margin-bottom: 0.4rem;
            color: var(--primary-color);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 14px;
            border: 2px solid #dfe6e9;
            border-radius: 10px;
            box-sizing: border-box;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--accent-color);
            background-color: #fff;
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, background 0.3s;
            margin-top: 1rem;
        }

        button:hover {
            background-color: #1e272e;
            transform: translateY(-2px);
        }

        .footer-links {
            margin-top: 2rem;
            font-size: 0.85rem;
            border-top: 1px solid #f1f2f6;
            padding-top: 1.5rem;
        }

        .footer-links a {
            color: #636e72;
            text-decoration: none;
            transition: color 0.2s;
        }

        .footer-links a:hover {
            color: var(--accent-color);
        }

        .brand-dot {
            color: var(--accent-color);
        }
    </style>
</head>

<body>

    <div class="login-card">
        <h1>SoapLab<span class="brand-dot">.</span></h1>
        <p>Accedi al tuo laboratorio digitale</p>

        <form action="db/login-process.php" method="POST">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="Inserisci la tua email" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>

            <button type="submit">Entra nel Lab</button>
        </form>

        <div class="footer-links" style="text-align: center; margin-top: 20px;">
            <span style="padding-right: 30px;">Non hai un account?</span>
            <a href="registrazione.html" style="text-decoration: underline;">Crea un account</a>
        </div>
    </div>

</body>

</html>
